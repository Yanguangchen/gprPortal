<!DOCTYPE html>
<html lang="en" data-theme="ocean">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060a12" />
  <title>GPR Image Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>

  <!-- Animated gradient backdrop -->
  <div class="bg-gradient" aria-hidden="true"></div>

  <div class="app-wrapper">

    <header class="glass header">
      <div class="header-inner">
        <div class="brand-block">
          <div class="logo">
            <span class="logo-icon" aria-hidden="true">⬡</span>
            <span class="logo-text">GPR<strong class="shimmer">Portal</strong></span>
          </div>
          <p class="logo-annotation">Specifically made for RAK Materials PTE LTD</p>
        </div>
        <p class="header-sub">Ground Penetrating Radar · Image Management System</p>
        <div class="header-actions">
          <div id="audio-switcher"></div>
          <div id="theme-switcher"></div>
        </div>
      </div>
      <button id="toggle-header" class="section-toggle" type="button"></button>
    </header>

    <!-- Components mount here — all markup is generated by JS modules -->
    <div id="user-profile"></div>
    <div id="upload-mount"></div>
    <div id="gallery-mount"></div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
