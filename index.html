<!DOCTYPE html>
<html lang="en" data-theme="ocean">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060a12" />
  <title>GPR Image Portal</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>

  <!-- Animated gradient backdrop -->
  <div class="bg-gradient" aria-hidden="true"></div>

  <div class="app-wrapper">

    <header class="glass header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon" aria-hidden="true">⬡</span>
          <span class="logo-text">GPR<strong>Portal</strong></span>
        </div>
        <p class="header-sub">Ground Penetrating Radar · Image Management System</p>
        <div class="header-actions">
          <div id="theme-switcher"></div>
        </div>
      </div>
    </header>

    <!-- Components mount here — all markup is generated by JS modules -->
    <div id="user-profile"></div>
    <div id="upload-mount"></div>
    <div id="gallery-mount"></div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
