<!DOCTYPE html>
<html lang="en" data-theme="ocean">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060a12" />
  <title>GPR Image Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>

  <!-- Animated gradient backdrop -->
  <div class="bg-gradient" aria-hidden="true"></div>
  <!-- Faint radar grid overlay -->
  <div class="grid-overlay" aria-hidden="true"></div>

  <div class="app-wrapper">

    <!-- Unified top bar: brand + system info + actions + user chip -->
    <header class="glass topbar">

      <div class="brand">
        <span class="brand-mark">
          <span class="pulse" aria-hidden="true"></span>
          <svg viewBox="0 0 42 42" fill="none" aria-hidden="true">
            <polygon points="21,3 36,11.5 36,30.5 21,39 6,30.5 6,11.5"
                     stroke="var(--accent)" stroke-width="1.5" opacity=".5"/>
            <polygon points="21,9 30.5,14.5 30.5,27.5 21,33 11.5,27.5 11.5,14.5"
                     stroke="var(--accent)" stroke-width="1.5"/>
            <circle cx="21" cy="21" r="3" fill="var(--accent)"/>
            <path d="M21 21 L21 14.5 M21 21 L30.5 24"
                  stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="brand-txt">
          <span class="brand-name">GPR<b>Portal</b></span>
          <span class="brand-tag">RAK Materials Pte Ltd</span>
        </span>
      </div>

      <div class="topbar-sep" aria-hidden="true"></div>
      <div class="sysline">
        <span class="k">System</span>
        <span class="v">Ground Penetrating Radar · Image Management</span>
      </div>

      <div class="topbar-actions">
        <div id="audio-switcher"></div>
        <div id="theme-switcher"></div>
        <!-- User chip / sign-in button rendered by app.js -->
        <div id="user-profile"></div>
      </div>
    </header>

    <!-- Page heading -->
    <div class="page-head">
      <div>
        <h1><span class="dot" aria-hidden="true"></span>Upload GPR Image</h1>
        <p>Add a new radar scan to the portal. Tag it with project metadata so your team can find it later.</p>
      </div>
      <nav class="crumbs" aria-label="Breadcrumb">
        <b>Portal</b><span aria-hidden="true">/</span>Upload<span aria-hidden="true">/</span>New scan
      </nav>
    </div>

    <!-- Components mount here — all markup generated by JS modules -->
    <div id="upload-mount"></div>
    <div id="gallery-mount"></div>

  </div>

  <!-- Upload success toast -->
  <div class="toast" id="upload-toast" role="status" aria-live="polite" hidden>
    <span class="toast-ic">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </span>
    <div>
      <div class="toast-title">Scan uploaded</div>
      <div class="toast-desc">Added to the portal gallery.</div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
