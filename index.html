<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPR Image Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Animated gradient backdrop ── -->
  <div class="bg-gradient"></div>

  <div class="app-wrapper">

    <!-- ══ HEADER ══ -->
    <header class="glass header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">GPR<strong>Portal</strong></span>
        </div>
        <p class="header-sub">Ground Penetrating Radar · Image Management System</p>
      </div>
    </header>

    <!-- ══ UPLOAD SECTION ══ -->
    <section class="glass upload-section" id="uploadSection">
      <h2 class="section-title">Upload GPR Image</h2>

      <div class="upload-grid">
        <!-- Drop zone -->
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept="image/*" hidden />
          <div class="drop-zone-inner" id="dropZoneInner">
            <svg class="drop-icon" viewBox="0 0 64 64" fill="none">
              <path d="M32 12v28M20 24l12-12 12 12" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 44v4a4 4 0 004 4h32a4 4 0 004-4v-4" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <p class="drop-label">Drag &amp; drop image here</p>
            <p class="drop-sub">or <button class="link-btn" id="browseBtn">browse file</button></p>
            <p class="drop-sub file-name" id="fileName"></p>
          </div>
          <img id="previewImg" class="preview-img" alt="Preview" hidden />
        </div>

        <!-- Meta fields -->
        <div class="upload-fields">
          <div class="field-group">
            <label for="companyName">Company Name</label>
            <input type="text" id="companyName" placeholder="e.g. Acme Engineering" />
          </div>
          <div class="field-group">
            <label for="projectName">Project Name</label>
            <input type="text" id="projectName" placeholder="e.g. Downtown Utility Survey" />
          </div>
          <div class="field-group">
            <label for="imageDate">Scan Date</label>
            <input type="date" id="imageDate" />
          </div>
          <button class="btn-primary" id="uploadBtn">
            <span id="uploadBtnText">Upload GPR Image</span>
            <span id="uploadSpinner" class="spinner" hidden></span>
          </button>
          <p class="upload-status" id="uploadStatus"></p>
        </div>
      </div>
    </section>

    <!-- ══ FILTER BAR ══ -->
    <section class="glass filter-section">
      <h2 class="section-title">Image Gallery</h2>
      <div class="filter-bar">
        <div class="filter-item">
          <label for="filterCompany">Company</label>
          <select id="filterCompany">
            <option value="">All Companies</option>
          </select>
        </div>
        <div class="filter-item">
          <label for="filterProject">Project</label>
          <select id="filterProject">
            <option value="">All Projects</option>
          </select>
        </div>
        <div class="filter-item">
          <label for="filterDateFrom">Date From</label>
          <input type="date" id="filterDateFrom" />
        </div>
        <div class="filter-item">
          <label for="filterDateTo">Date To</label>
          <input type="date" id="filterDateTo" />
        </div>
        <div class="filter-item filter-search">
          <label for="filterSearch">Search</label>
          <input type="text" id="filterSearch" placeholder="Company, project…" />
        </div>
        <button class="btn-ghost" id="clearFiltersBtn">Clear</button>
      </div>
      <p class="gallery-count" id="galleryCount"></p>
    </section>

    <!-- ══ GALLERY ══ -->
    <section class="gallery-section">
      <div class="gallery-grid" id="galleryGrid">
        <!-- Cards injected by JS -->
      </div>
      <p class="empty-state" id="emptyState" hidden>No images match the current filters.</p>
    </section>

  </div><!-- /app-wrapper -->

  <!-- ══ LIGHTBOX ══ -->
  <div class="lightbox" id="lightbox" hidden>
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose">✕</button>
      <img id="lightboxImg" src="" alt="Full size GPR image" />
      <div class="lightbox-meta" id="lightboxMeta"></div>
    </div>
  </div>

  <!-- ══ EDIT MODAL ══ -->
  <div class="modal" id="editModal" hidden>
    <div class="modal-backdrop" id="editModalBackdrop"></div>
    <div class="glass modal-box">
      <h3 class="modal-title">Edit Record</h3>
      <input type="hidden" id="editId" />
      <div class="field-group">
        <label for="editCompany">Company Name</label>
        <input type="text" id="editCompany" />
      </div>
      <div class="field-group">
        <label for="editProject">Project Name</label>
        <input type="text" id="editProject" />
      </div>
      <div class="field-group">
        <label for="editDate">Scan Date</label>
        <input type="date" id="editDate" />
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" id="editCancelBtn">Cancel</button>
        <button class="btn-primary" id="editSaveBtn">
          <span id="editSaveBtnText">Save Changes</span>
          <span id="editSpinner" class="spinner" hidden></span>
        </button>
      </div>
      <p class="upload-status" id="editStatus"></p>
    </div>
  </div>

  <!-- ══ DELETE CONFIRM MODAL ══ -->
  <div class="modal" id="deleteModal" hidden>
    <div class="modal-backdrop" id="deleteModalBackdrop"></div>
    <div class="glass modal-box modal-box--sm">
      <h3 class="modal-title">Delete Image?</h3>
      <p class="modal-body">This will permanently remove the image and its record. This action cannot be undone.</p>
      <input type="hidden" id="deleteId" />
      <input type="hidden" id="deleteStoragePath" />
      <div class="modal-actions">
        <button class="btn-ghost" id="deleteCancelBtn">Cancel</button>
        <button class="btn-danger" id="deleteConfirmBtn">
          <span id="deleteBtnText">Delete</span>
          <span id="deleteSpinner" class="spinner" hidden></span>
        </button>
      </div>
      <p class="upload-status" id="deleteStatus"></p>
    </div>
  </div>

  <!-- Firebase SDKs (replace with your project config) -->
  <script type="module" src="app.js"></script>
</body>
</html>
